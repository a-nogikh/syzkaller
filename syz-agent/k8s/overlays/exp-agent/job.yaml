apiVersion: batch/v1
kind: Job
metadata:
  name: syz-agent
  namespace: syz-agent
  annotations:
    ignore-check.kube-linter.io/non-existent-service-account: "Service account is defined in Terraform"
    ignore-check.kube-linter.io/sensitive-host-mounts: "Mounting /dev is needed to access dynamically created loop devices during kernel image embedding"
spec:
  activeDeadlineSeconds: 43200
  template:
    metadata:
      labels:
        app: syz-agent
    spec:
      restartPolicy: Never
      serviceAccountName: syz-agent-ksa
      containers:
      - name: syz-agent
        image: gcr.io/syzkaller/syz-agent:latest # Replace with your image.
        args:
          - "-name=$(POD_NAME)"
          - "-config=/etc/syz-agent/config.json"
          - "-suffix=${EXP_NAME}"
          - "-workflows=${WORKFLOWS}"
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: HOME # Otherwise it's failing with "warning: unable to access '/root/.config/git/attributes': Permission denied.".
            value: "/home/syzkaller"
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: "14"
            memory: "56Gi"
          limits:
            cpu: "32"
            memory: "96Gi"
        volumeMounts:
          - name: config-volume
            mountPath: /etc/syz-agent
            readOnly: true
          - name: workdir
            mountPath: /app/workdir
          - name: dev-kvm
            mountPath: /dev/kvm
          - name: dev
            mountPath: /dev
      volumes:
        - name: config-volume
          configMap:
            name: syz-agent-config
        - name: dev-kvm
          hostPath:
            path: /dev/kvm
            type: CharDevice
        - name: dev
          hostPath:
            path: /dev
            type: Directory
        - name: workdir
          emptyDir:
            sizeLimit: 100Gi